name: fake-shop

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FAKE_SHOP_MODE: ${FAKE_SHOP_MODE:-mock}
      FAKE_SHOP_PUBLIC_URL: ${FAKE_SHOP_PUBLIC_URL:-http://127.0.0.1:3000}
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    init: true
    ports:
      - "127.0.0.1:3000:3000"
